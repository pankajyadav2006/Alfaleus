<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpportunityRadar | Startup Opportunity Aggregator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0b;
            --card-bg: #141416;
            --accent-green: #00ff66;
            --accent-blue: #00ccff;
            --accent-orange: #ff9900;
            --accent-red: #ff4d4d;
            --text-main: #e1e1e6;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent-green);
        }

        .logo-group h1 {
            font-size: 2rem;
            color: var(--accent-green);
            letter-spacing: -1px;
        }

        .logo-group p {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .last-updated {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--accent-green);
            color: var(--bg-color);
        }

        button.secondary {
            border-color: var(--text-dim);
            color: var(--text-dim);
        }

        button.secondary:hover {
            background: var(--text-dim);
            color: var(--bg-color);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-left: 4px solid var(--accent-green);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-main);
        }

        /* Filters */
        .filters {
            background: var(--card-bg);
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            border: 1px solid var(--border);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        input, select {
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: var(--accent-green);
            outline: none;
        }

        /* Grid */
        .opportunity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 2rem;
        }

        @media (max-width: 600px) {
            .opportunity-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 2px;
        }

        .badge-grant { background: var(--accent-green); color: var(--bg-color); }
        .badge-conference { background: var(--accent-blue); color: var(--bg-color); }
        .badge-accelerator { background: var(--accent-orange); color: var(--bg-color); }
        .badge-competition { background: #9933ff; color: #fff; }
        .badge-other { background: var(--text-dim); color: var(--bg-color); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
            color: var(--text-main);
        }

        .card-organizer {
            font-size: 0.85rem;
            color: var(--accent-green);
        }

        .card-location {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .card-deadline {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            padding: 0.4rem;
            background: rgba(255, 77, 77, 0.1);
            color: var(--accent-red);
            border-left: 2px solid var(--accent-red);
        }

        .ai-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .ai-tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--bg-color);
            padding: 0.2rem 0.4rem;
            border: 1px solid var(--border);
        }

        /* Controls */
        .controls {
            margin-top: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
        }

        .export-group {
            display: flex;
            gap: 1rem;
        }

        /* Utils */
        .loading-spinner {
            text-align: center;
            padding: 4rem;
            color: var(--accent-green);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            grid-column: 1 / -1;
            color: var(--text-dim);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-group">
            <h1>OPPORTUNITY RADAR</h1>
            <p>AGGREGATING STARTUP OPPORTUNITIES IN REAL-TIME</p>
        </div>
        <div class="nav-actions">
            <span class="last-updated" id="last-updated-time">Last updated: Never</span>
            <button id="refresh-btn">Refresh Scraper</button>
        </div>
    </nav>

    <div class="stats-bar" id="stats-container">
        <div class="stat-card"><h3>TOTAL</h3><div class="value" id="stat-total">0</div></div>
        <div class="stat-card"><h3>GRANTS</h3><div class="value" id="stat-grants">0</div></div>
        <div class="stat-card"><h3>ACCELERATORS</h3><div class="value" id="stat-accelerators">0</div></div>
        <div class="stat-card"><h3>CONFERENCES</h3><div class="value" id="stat-conferences">0</div></div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Search</label>
            <input type="text" id="search-input" placeholder="Keyword in title or description...">
        </div>
        <div class="filter-group">
            <label>Type</label>
            <select id="type-filter">
                <option value="All">All Types</option>
                <option value="Grant">Grant</option>
                <option value="Accelerator">Accelerator</option>
                <option value="Conference">Conference</option>
                <option value="Competition">Competition</option>
                <option value="Fellowship">Fellowship</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Source</label>
            <select id="source-filter">
                <option value="All">All Sources</option>
            </select>
        </div>
        <div class="filter-group" style="flex-direction: row; align-items: flex-end; gap: 1rem;">
            <button id="apply-filters">Apply</button>
            <button id="reset-filters" class="secondary">Reset</button>
        </div>
    </div>

    <div id="loading" class="loading-spinner hidden">_ SCANNING THE WEB...</div>
    <div class="opportunity-grid" id="grid">
        <!-- Cards will be injected here -->
    </div>

    <div class="controls">
        <div class="pagination">
            <button id="prev-page" class="secondary">Previous</button>
            <span id="page-info" style="align-self: center;">Page 1</span>
            <button id="next-page" class="secondary">Next</button>
        </div>
        <div class="export-group">
            <button onclick="location.href='/api/export/csv'" class="secondary">Export CSV</button>
            <button onclick="location.href='/api/export/json'" class="secondary">Export JSON</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const limit = 20;

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-grants').textContent = data.by_type['Grant'] || 0;
                document.getElementById('stat-accelerators').textContent = data.by_type['Accelerator'] || 0;
                document.getElementById('stat-conferences').textContent = data.by_type['Conference'] || 0;
                
                if (data.last_updated) {
                    const date = new Date(data.last_updated);
                    document.getElementById('last-updated-time').textContent = `Last updated: ${date.toLocaleString()}`;
                }

                // Update source dropdown
                const sourceFilter = document.getElementById('source-filter');
                const currentVal = sourceFilter.value;
                sourceFilter.innerHTML = '<option value="All">All Sources</option>';
                Object.keys(data.by_source).forEach(source => {
                    const opt = document.createElement('option');
                    opt.value = source;
                    opt.textContent = source;
                    sourceFilter.appendChild(opt);
                });
                sourceFilter.value = currentVal;
            } catch (err) {
                console.error("Stats fetch error:", err);
            }
        }

        async function fetchOpportunities() {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('loading');
            
            grid.innerHTML = '';
            loader.classList.remove('hidden');

            const keyword = document.getElementById('search-input').value;
            const type = document.getElementById('type-filter').value;
            const source = document.getElementById('source-filter').value;

            const params = new URLSearchParams({
                page: currentPage,
                limit: limit,
                keyword: keyword,
                type: type,
                source: source
            });

            try {
                const res = await fetch(`/api/opportunities?${params}`);
                const data = await res.json();
                
                loader.classList.add('hidden');

                if (data.items.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No opportunities found matching your criteria. Try adjusting filters.</div>';
                } else {
                    data.items.forEach(opp => {
                        const card = createCard(opp);
                        grid.appendChild(card);
                    });
                }

                document.getElementById('page-info').textContent = `Page ${data.page}`;
                document.getElementById('prev-page').disabled = data.page === 1;
                document.getElementById('next-page').disabled = data.items.length < limit;
                
            } catch (err) {
                console.error("Fetch error:", err);
                loader.classList.add('hidden');
                grid.innerHTML = '<div class="empty-state">Error loading data. Please try again later.</div>';
            }
        }

        function createCard(opp) {
            const div = document.createElement('div');
            div.className = 'card';
            
            const typeClass = `badge-${opp.type.toLowerCase()}`;
            
            // Highlight deadline if within 7 days
            let deadlineClass = 'card-deadline';
            const deadlineDate = new Date(opp.deadline);
            if (!isNaN(deadlineDate)) {
                const now = new Date();
                const diffTime = deadlineDate - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays > 0 && diffDays <= 7) {
                    deadlineClass += ' deadline-urgent';
                }
            }

            div.innerHTML = `
                <div class="card-header">
                    <span class="badge ${typeClass}">${opp.type}</span>
                    <span style="font-size: 0.7rem; color: var(--text-dim)">${opp.source_name}</span>
                </div>
                <div>
                    <h3 class="card-title">${opp.title}</h3>
                    <p class="card-organizer">${opp.organizer}</p>
                    <p class="card-location">${opp.location}</p>
                </div>
                <div class="${deadlineClass}">DEADLINE: ${opp.deadline}</div>
                <div class="ai-tags">
                    <span class="ai-tag">💰 ${opp.funding_range || 'Unknown'}</span>
                    <span class="ai-tag">🚀 ${opp.startup_stage || 'Any Stage'}</span>
                    <span class="ai-tag">📍 ${opp.remote_or_onsite || 'Global'}</span>
                </div>
                <button onclick="window.open('${opp.source_link}', '_blank')" style="margin-top: 1rem; width: 100%">View Opportunity</button>
            `;
            return div;
        }

        // Debounce search
        let timeout = null;
        document.getElementById('search-input').addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                currentPage = 1;
                fetchOpportunities();
            }, 300);
        });

        document.getElementById('apply-filters').addEventListener('click', () => {
            currentPage = 1;
            fetchOpportunities();
        });

        document.getElementById('reset-filters').addEventListener('click', () => {
            document.getElementById('search-input').value = '';
            document.getElementById('type-filter').value = 'All';
            document.getElementById('source-filter').value = 'All';
            currentPage = 1;
            fetchOpportunities();
        });

        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                fetchOpportunities();
                window.scrollTo(0, 0);
            }
        });

        document.getElementById('next-page').addEventListener('click', () => {
            currentPage++;
            fetchOpportunities();
            window.scrollTo(0, 0);
        });

        document.getElementById('refresh-btn').addEventListener('click', async () => {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.textContent = 'SCRAPING...';
            
            try {
                const res = await fetch('/api/scrape', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: document.getElementById('search-input').value || "AI startup" })
                });
                alert("Scraper started in background. Refresh page in a few minutes.");
            } catch (err) {
                console.error("Scrape trigger error:", err);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Refresh Scraper';
            }
        });

        // Initial load
        fetchStats();
        fetchOpportunities();
        // Refresh stats periodically
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
